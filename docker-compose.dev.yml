# Development Docker Compose configuration for WispChat
# Includes hot-reload and debugging support

services:
  wispchat-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wispchat-development
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot-reload
      - ./app:/app/app
      - ./static:/app/static
      - ./templates:/app/templates
      - ./alembic:/app/alembic
      # Persistent volume for SQLite database
      - ./data:/app/data
      # Mount .env file for configuration
      - ./.env:/app/.env:ro
    environment:
      - APP_ENV=development
      - DEBUG=true
    restart: unless-stopped
    command: >
      sh -c "python -m alembic upgrade head && 
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
