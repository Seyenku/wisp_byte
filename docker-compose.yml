services:
  chat-app:
    build: .
    container_name: chat-service-app
    ports:
      - "12251:12251"
    volumes:
      # Пробрасываем локальную базу данных, чтобы данные не терялись при перезапуске контейнера
      - ./chat.db:/app/chat.db
      # Пробрасываем .env файл, если он есть
      - ./.env:/app/.env
      # Пробрасываем код и статику для мгновенного обновления (hot-reload) без пересборки
      - ./app:/app/app
      - ./static:/app/static
      - ./templates:/app/templates
    restart: unless-stopped
