<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<title>Чат</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; display: flex;
         justify-content: center; align-items: center; min-height: 100vh; }
  .container { width: 520px; }
  h1 { text-align: center; margin-bottom: 20px; font-size: 1.4rem; color: #a0c4ff; }

  /* AUTH */
  #auth { background: #16213e; padding: 24px; border-radius: 8px; }
  #auth input { display: block; width: 100%; padding: 10px; margin: 8px 0;
                background: #0f3460; border: 1px solid #334; color: #e0e0e0;
                border-radius: 4px; font-size: 0.95rem; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn-row button { flex: 1; padding: 10px; border: none; border-radius: 4px;
                    cursor: pointer; font-size: 0.95rem; }
  #btn-login  { background: #0f3460; color: #a0c4ff; }
  #btn-reg    { background: #0f3460; color: #90ee90; }
  #auth-error { color: #ff6b6b; margin-top: 10px; min-height: 1.2em; font-size: 0.9rem; }

  /* CHAT */
  #chat { display: none; background: #16213e; padding: 24px; border-radius: 8px; }
  #status-bar { font-size: 0.85rem; color: #888; margin-bottom: 10px; }
  #messages { border: 1px solid #334; height: 320px; overflow-y: auto;
              padding: 10px; border-radius: 4px; background: #0d0d1a; margin-bottom: 12px; }
  .msg { margin-bottom: 8px; font-size: 0.9rem; }
  .msg-them { color: #a0c4ff; }
  .msg-me   { color: #90ee90; text-align: right; }
  .msg-sys  { color: #888; font-style: italic; }
  .msg-queued::after { content: " [офлайн]"; font-size: 0.75rem; color: #aaa; }
  #to-input, #msg-input { width: 100%; padding: 8px 10px; margin-bottom: 8px;
                           background: #0f3460; border: 1px solid #334; color: #e0e0e0;
                           border-radius: 4px; font-size: 0.9rem; }
  #send-btn { width: 100%; padding: 10px; background: #0f3460; color: #a0c4ff;
              border: none; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Чат-Сервер</h1>

  <div id="auth">
    <input id="u" type="text"     placeholder="Логин"   autocomplete="off"/>
    <input id="p" type="password" placeholder="Пароль"  autocomplete="off"/>
    <div class="btn-row">
      <button id="btn-login" onclick="authAction('login')">Войти</button>
      <button id="btn-reg"   onclick="authAction('register')">Регистрация</button>
    </div>
    <div id="auth-error"></div>
  </div>

  <div id="chat">
    <div id="status-bar"></div>
    <div id="messages"></div>
    <input id="to-input"  type="text" placeholder="Получатель" autocomplete="off"/>
    <input id="msg-input" type="text" placeholder="Сообщение..."   autocomplete="off"/>
    <button id="send-btn" onclick="sendMessage()">Отправить</button>
  </div>
</div>

<script>
let ws = null;
let myName = "";

async function authAction(action) {
  const u = document.getElementById("u").value.trim();
  const p = document.getElementById("p").value;
  const errEl = document.getElementById("auth-error");
  errEl.textContent = "";

  if (!u || !p) { errEl.textContent = "Заполните оба поля."; return; }

  let res, data;
  if (action === "register") {
    res = await fetch("/register", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({username: u, password: p})
    });
    data = await res.json();
  } else {
    const form = new URLSearchParams();
    form.append("username", u);
    form.append("password", p);
    res = await fetch("/login", {method: "POST", body: form});
    data = await res.json();
  }

  if (!res.ok) { errEl.textContent = data.detail || "Ошибка"; return; }

  myName = u;
  openChat(data.access_token);
}

function openChat(token) {
  document.getElementById("auth").style.display = "none";
  document.getElementById("chat").style.display  = "block";
  document.getElementById("status-bar").textContent = "Вы: " + myName;

  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws?token=${encodeURIComponent(token)}`);

  ws.onmessage = function(e) {
    const data = JSON.parse(e.data);
    const el = document.createElement("div");
    el.className = "msg";
    if (data.system) {
      el.className += " msg-sys";
      el.textContent = ">> " + data.system;
    } else {
      el.className += " msg-them";
      if (data.queued) el.className += " msg-queued";
      el.textContent = data.from + ": " + data.text;
    }
    const box = document.getElementById("messages");
    box.appendChild(el);
    box.scrollTop = box.scrollHeight;
  };

  ws.onclose = function(e) {
    addSys("Соединение закрыто (код " + e.code + ")");
  };
}

function addSys(text) {
  const el = document.createElement("div");
  el.className = "msg msg-sys";
  el.textContent = ">> " + text;
  const box = document.getElementById("messages");
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function sendMessage() {
  const to   = document.getElementById("to-input").value.trim();
  const text = document.getElementById("msg-input").value.trim();
  if (!to || !text) return;

  ws.send(JSON.stringify({to, text}));

  const el = document.createElement("div");
  el.className = "msg msg-me";
  el.textContent = "→ " + to + ": " + text;
  const box = document.getElementById("messages");
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;

  document.getElementById("msg-input").value = "";
}

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    if (document.getElementById("chat").style.display !== "none") sendMessage();
    else authAction("login");
  }
});
</script>
</body>
</html>
