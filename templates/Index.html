<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WispChat - Защищенный Мессенджер</title>
    <!-- Custom Fonts: Space Grotesk + IBM Plex Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Animated Particle Nebula Background -->
    <canvas id="nebula-canvas" aria-hidden="true"></canvas>
    <div class="bg-gradients" aria-hidden="true"></div>
    
    <!-- Overlay for transitions -->
    <div id="overlay" class="overlay"></div>

    <!-- Bootstrap Toasts Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" id="toast-container" style="z-index: 1100;"></div>

    <!-- Auth Section -->
    <div id="auth-container" class="auth-wrapper hidden">
        <div class="auth-glass-panel anim-fade-up">
            <div class="auth-logo-wrap">
                <div class="auth-badge">
                    <i class="fa-solid fa-bolt"></i>
                </div>
                <h1 class="auth-title">WispChat</h1>
                <p class="auth-subtitle">Защищенный мессенджер</p>
            </div>
            
            <div class="auth-form-wrap">
                <div class="input-glass-group">
                    <label for="username" class="input-label">Логин</label>
                    <input type="text" class="input-glass" id="username" placeholder="Введите логин" maxlength="32">
                    <span class="input-hint">Минимум 3 символа</span>
                </div>
                
                <div class="input-glass-group">
                    <label for="password" class="input-label">Пароль</label>
                    <input type="password" class="input-glass" id="password" placeholder="Введите пароль" minlength="8">
                    <span class="input-hint">Минимум 8 символов</span>
                </div>

                <div class="auth-btn-group">
                    <button class="btn-glass btn-glass-primary" id="btn-login" onclick="auth('/login')">
                        <span class="btn-text">Войти</span>
                        <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    </button>
                    <button class="btn-glass btn-glass-ghost" id="btn-register" onclick="auth('/register')">
                        <span class="btn-text">Регистрация</span>
                        <i class="fa-solid fa-user-plus"></i>
                    </button>
                </div>
            </div>
            
            <div class="auth-footer">
                <span class="auth-divider"></span>
                <span class="auth-note">Конечное шифрование всех сообщений</span>
            </div>
        </div>
    </div>

    <!-- Main App Section -->
    <div id="app-container" class="app-wrapper hidden">
        <!-- Sidebar -->
        <aside class="sidebar-glass-panel" id="sidebar">
            <!-- User Profile Header -->
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar-glass avatar-lg" id="my-avatar">?</div>
                    <div class="user-info">
                        <span class="user-name" id="my-username">-</span>
                        <span class="user-status" id="my-status">
                            <span class="status-dot"></span>
                            В сети
                        </span>
                    </div>
                </div>
                <button class="icon-btn glass-icon" onclick="logout()" title="Выйти" aria-label="Выйти">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>
            
            <!-- Search -->
            <div class="sidebar-search">
                <div class="search-glass">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" class="search-input" placeholder="Поиск людей..." onkeyup="searchUsers()" aria-label="Поиск">
                </div>
            </div>

            <!-- Lists Container -->
            <div class="sidebar-lists custom-scrollbar">
                <!-- Search Results -->
                <div id="search-results" class="sidebar-section hidden"></div>
                
                <!-- Friend Requests -->
                <div id="requests-list" class="sidebar-section hidden"></div>
                
                <!-- Friends List -->
                <div id="friends-list" class="sidebar-section"></div>
            </div>
            
            <!-- Decorative footer wave -->
            <div class="sidebar-footer" aria-hidden="true">
                <svg width="100%" height="60" preserveAspectRatio="none" viewBox="0 0 200 60">
                    <path d="M0,60 Q50,30 100,45 T200,60 V60 H0 Z" fill="rgba(6,214,160,0.05)"/>
                </svg>
            </div>
        </aside>

        <!-- Chat Area -->
        <main class="chat-area-panel" id="chat-area">
            <!-- Initial State -->
            <div id="no-chat-selected" class="chat-empty-state">
                <div class="chat-empty-icon-wrap">
                    <i class="fa-regular fa-comments"></i>
                </div>
                <h2 class="chat-empty-title">Выберите чат</h2>
                <p class="chat-empty-text">Начните общение с друзьями</p>
            </div>

            <!-- Active Chat State -->
            <div id="active-chat" class="chat-active-state hidden">
                <!-- Chat Header -->
                <header class="chat-header-glass">
                    <div class="chat-header-left">
                        <button id="back-btn" class="icon-btn glass-icon d-md-none" onclick="closeChat()" aria-label="Назад">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <div class="chat-avatar-glass avatar-lg" id="chat-avatar">?</div>
                        <div class="chat-header-info">
                            <h3 class="chat-title" id="chat-title">-</h3>
                            <span class="chat-status" id="chat-status">
                                <span class="status-dot status-online"></span>
                                В сети
                            </span>
                        </div>
                    </div>
                    <button class="icon-btn glass-icon danger" onclick="confirmRemoveFriend()" title="Удалить из друзей">
                        <i class="fa-solid fa-user-minus"></i>
                    </button>
                </header>

                <!-- Messages Box -->
                <div id="messages" class="messages-container custom-scrollbar"></div>

                <!-- Input Area -->
                <footer class="chat-input-glass">
                    <div class="input-container">
                        <input type="text" id="msg-input" class="chat-input" placeholder="Напишите сообщение..." onkeypress="handleEnter(event)" autocomplete="off" aria-label="Сообщение">
                        <button class="btn-send glass-icon" onclick="sendMessage()" aria-label="Отправить">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </footer>
            </div>
        </main>
    </div>

    <!-- Confirm Remove Modal -->
    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal-glass" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <h3 class="modal-title" id="modal-title">Удаление друга</h3>
            <p class="modal-text">
                Вы уверены, что хотите удалить <strong id="remove-target-name" class="text-accent"></strong> из друзей?
            </p>
            <div class="modal-actions">
                <button class="btn-glass btn-glass-ghost" id="modalCancel">Отмена</button>
                <button class="btn-glass btn-glass-danger" id="modalConfirm">Удалить</button>
            </div>
        </div>
    </div>

    <!-- App JS -->
    <script src="/static/js/app.js"></script>
</body>
</html>
